name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect .NET version
        id: detect
        run: |
          DOTNET_VER=$(grep -oP '<TargetFramework>net\K[0-9]+' Directory.Build.props)
          echo "dotnet_version=${DOTNET_VER}.0.x" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.detect.outputs.dotnet_version }}

      - name: Restore
        run: dotnet restore TickerQ.MongoDB.slnx

      - name: Build
        run: dotnet build TickerQ.MongoDB.slnx --configuration Release --no-restore

      # ubuntu-latest has Docker pre-installed, so Testcontainers can spin a mongo:7 container.
      - name: Test
        run: dotnet test tests/TickerQ.MongoDB.Tests/TickerQ.MongoDB.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/**/TestResults/*.trx
          if-no-files-found: ignore
