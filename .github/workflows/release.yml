name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  pack-and-publish:
    name: Pack and Publish to NuGet
    runs-on: ubuntu-latest
    environment: nuget-publish
    permissions:
      contents: read
      id-token: write   # required for NuGet Trusted Publishing OIDC token exchange
    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # MinVer reads git tags to determine the package version

      - name: Detect .NET version
        id: detect
        run: |
          DOTNET_VER=$(grep -oP '<TargetFramework>net\K[0-9]+' Directory.Build.props)
          echo "dotnet_version=${DOTNET_VER}.0.x" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: ${{ steps.detect.outputs.dotnet_version }}

      - name: Build
        run: dotnet build src/TickerQ.MongoDB/TickerQ.MongoDB.csproj --configuration Release

      - name: Test (gate publish on tests passing)
        run: dotnet test tests/TickerQ.MongoDB.Tests/TickerQ.MongoDB.Tests.csproj --configuration Release

      - name: Pack
        run: dotnet pack src/TickerQ.MongoDB/TickerQ.MongoDB.csproj --configuration Release --no-build --output ./nupkgs

      - name: Show package sizes
        run: |
          for pkg in ./nupkgs/*.nupkg ./nupkgs/*.snupkg; do
            [ -f "$pkg" ] && echo " - $(basename "$pkg"): $(du -h "$pkg" | cut -f1)"
          done

      - name: Upload nupkgs artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nupkgs
          path: ./nupkgs

      # NuGet Trusted Publishing — exchanges the GitHub OIDC token for a 1-hour API key.
      # No long-lived NUGET_API_KEY required. NUGET_USER is your nuget.org profile name
      # (NOT your email) and must match the policy owner registered on nuget.org. It's
      # public information so it's stored as an environment variable, not a secret.
      - name: NuGet login (OIDC -> temporary API key)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ vars.NUGET_USER }}

      # NOTE: --skip-duplicate intentionally omitted on the primary push so
      # prefix-reservation 409s, auth 409s, etc. surface as workflow failures
      # rather than being silently swallowed as "already exists".
      - name: Push to NuGet
        run: |
          for f in ./nupkgs/*.nupkg; do
            echo "Pushing $(basename "$f")..."
            dotnet nuget push "$f" \
              --source https://api.nuget.org/v3/index.json \
              --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          done

      - name: Push symbols to NuGet
        continue-on-error: true
        run: |
          for f in ./nupkgs/*.snupkg; do
            [ -f "$f" ] || continue
            echo "Pushing symbols $(basename "$f")..."
            dotnet nuget push "$f" \
              --source https://api.nuget.org/v3/index.json \
              --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
              --skip-duplicate
          done
